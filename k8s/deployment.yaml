apiVersion: apps/v1
kind: Deployment
metadata:
  name: fruit-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fruit-classifier
  template:
    metadata:
      labels:
        app: fruit-classifier
    spec:
      containers:
        - name: fruit-classifier
          image: 664418990900.dkr.ecr.us-east-1.amazonaws.com/fruit-classifier:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fruit-classifier-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10