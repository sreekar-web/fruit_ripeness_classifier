version: "3.9"

services:
  fruit-classifier:
    build: .
    ports:
      - "8000:8000"
    environment:
      - S3_BUCKET=fruit-classifier-model-store
      - MODEL_KEY=models/best_model.pth
      - DYNAMO_TABLE=fruit-predictions
      - AWS_REGION=us-east-1
    volumes:
      - ~/.aws:/root/.aws:ro