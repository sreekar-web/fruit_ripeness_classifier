<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fruit Ripeness Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { font-size: 2rem; margin-bottom: 6px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
    .upload-area { border: 2px dashed #444; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; width: 100%; max-width: 500px; transition: border-color 0.2s; }
    .upload-area:hover { border-color: #4ade80; }
    .upload-area input { display: none; }
    .upload-area label { cursor: pointer; font-size: 1rem; color: #aaa; }
    .upload-area label span { color: #4ade80; font-weight: 600; }
    #preview { margin-top: 16px; max-width: 200px; border-radius: 8px; display: none; margin-left: auto; margin-right: auto; }
    .btn { margin-top: 20px; background: #4ade80; color: #0f1117; border: none; padding: 12px 32px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #22c55e; }
    .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
    .results { margin-top: 40px; width: 100%; max-width: 800px; }
    .prediction-box { background: #1a1d27; border-radius: 12px; padding: 24px; margin-bottom: 24px; text-align: center; }
    .prediction-box .label { font-size: 2rem; font-weight: 700; text-transform: uppercase; }
    .ripe { color: #4ade80; }
    .unripe { color: #facc15; }
    .rotten { color: #f87171; }
    .confidence { font-size: 1rem; color: #888; margin-top: 4px; }
    .scores { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .score-item { background: #252836; border-radius: 8px; padding: 10px 20px; font-size: 0.9rem; }
    .score-item span { font-weight: 700; color: #4ade80; }
    .images-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .image-card { background: #1a1d27; border-radius: 12px; padding: 16px; text-align: center; }
    .image-card img { width: 100%; border-radius: 8px; }
    .image-card p { margin-top: 10px; font-size: 0.85rem; color: #888; }
    .loader { display: none; margin-top: 20px; font-size: 0.95rem; color: #4ade80; }
    .error { color: #f87171; margin-top: 16px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>🍎 Fruit Ripeness Classifier</h1>
  <p class="subtitle">Upload a photo of an apple, banana, or orange to classify its ripeness</p>

  <div class="upload-area" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" />
    <label for="fileInput">
      Drop an image here or <span>click to upload</span>
    </label>
    <img id="preview" alt="preview" />
  </div>

  <button class="btn" id="analyzeBtn" disabled>Analyze</button>
  <div class="loader" id="loader">⏳ Analyzing image...</div>
  <div class="error" id="error"></div>

  <div class="results" id="results" style="display:none;">
    <div class="prediction-box">
      <div class="label" id="predLabel"></div>
      <div class="confidence" id="predConfidence"></div>
      <div class="scores" id="predScores"></div>
    </div>
    <div class="images-grid">
      <div class="image-card">
        <img id="imgOriginal" alt="Original" />
        <p>Original</p>
      </div>
      <div class="image-card">
        <img id="imgHeatmap" alt="Grad-CAM Heatmap" />
        <p>Grad-CAM Heatmap</p>
      </div>
      <div class="image-card">
        <img id="imgOverlay" alt="Overlay" />
        <p>Overlay</p>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loader = document.getElementById('loader');
    const error = document.getElementById('error');
    const results = document.getElementById('results');

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      analyzeBtn.disabled = false;
      results.style.display = 'none';
      error.textContent = '';
    });

    analyzeBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      analyzeBtn.disabled = true;
      loader.style.display = 'block';
      error.textContent = '';
      results.style.display = 'none';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/predict-with-gradcam', { method: 'POST', body: formData });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        const cls = data.predicted_class;
        document.getElementById('predLabel').textContent = cls;
        document.getElementById('predLabel').className = `label ${cls}`;
        document.getElementById('predConfidence').textContent = `Confidence: ${data.confidence}%`;

        const scoresEl = document.getElementById('predScores');
        scoresEl.innerHTML = Object.entries(data.all_scores)
          .map(([k, v]) => `<div class="score-item">${k}: <span>${v}%</span></div>`)
          .join('');

        document.getElementById('imgOriginal').src = `data:image/png;base64,${data.original_image}`;
        document.getElementById('imgHeatmap').src = `data:image/png;base64,${data.gradcam_heatmap}`;
        document.getElementById('imgOverlay').src = `data:image/png;base64,${data.gradcam_overlay}`;

        results.style.display = 'block';
      } catch (err) {
        error.textContent = `Error: ${err.message}`;
      } finally {
        analyzeBtn.disabled = false;
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
